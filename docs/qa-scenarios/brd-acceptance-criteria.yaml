# ═══════════════════════════════════════════════════════════════════
# EPIC 11: AI Governance and State-Based Suppression (P0)
# ═══════════════════════════════════════════════════════════════════

  - id: "E11.1-01"
    epic: "Epic-11.1"
    requirement: "AI fully visible in Draft/In-Progress state"
    test_method: "Open draft review, check for CLARA content"
    expected: "CLARA recommendations, insights, 'Generated by Clara' labels all present"
    validation: "Search page for 'CLARA', 'Generated by Clara', recommendation cards"
    automatable: true

  - id: "E11.1-02"
    epic: "Epic-11.1"
    requirement: "AI suppressed in Final Approved state"
    test_method: "Open approved review, search for any AI content"
    expected: "Zero instances of 'CLARA', 'Generated by Clara', AI suggestion markers"
    validation: "Text search returns 0 matches for all AI keywords"
    automatable: true
    note: "Requires approved review — confirmed working on 407615"

  - id: "E11.1-03"
    epic: "Epic-11.1"
    requirement: "AI suppressed in Submitted state"
    test_method: "Open submitted review, search for AI content"
    expected: "AI content hidden from reviewer view; approver-assist only (if approver)"
    validation: "As reviewer: zero AI. As approver: summary visible but labeled"
    automatable: true

  - id: "E11.2-01"
    epic: "Epic-11.2"
    requirement: "Suppression is irreversible within review cycle"
    test_method: "After submission, attempt to re-surface AI (if possible)"
    expected: "No mechanism exists to re-show AI after transition to Submitted/Approved"
    validation: "No toggle, button, or URL parameter re-enables AI"
    automatable: true

  - id: "E11.2-02"
    epic: "Epic-11.2"
    requirement: "Fail-safe default on unknown state"
    test_method: "If state determination fails, check behavior"
    expected: "Full suppression (fail closed, never open)"
    validation: "Cannot easily test without system access"
    automatable: false

  - id: "E11.3-01"
    epic: "Epic-11.3"
    requirement: "Export contains zero AI content"
    test_method: "Export evidence package, search for AI markers"
    expected: "Zero instances of CLARA, AI-generated, suggestion markers in export"
    validation: "Download export; text search for AI keywords"
    automatable: false
    note: "Requires export functionality and file content analysis"

