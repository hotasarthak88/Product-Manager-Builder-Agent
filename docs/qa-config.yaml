# PM Builder Agent — QA Configuration
# This file configures product-specific QA settings.
# Each PM team customizes this for their product.
#
# USAGE: The agent reads this file on every QA run.
#        Edit values below to match your product and team.

# ─────────────────────────────────────────────────────────────────
# PRODUCT CONFIGURATION
# ─────────────────────────────────────────────────────────────────

product:
  name: "CLARA Reviews AI Assistant"  # Your product name
  environment: "gamma"                 # gamma | beta | prod | localhost
  base_url: "https://gamma.grc.a2z.com"  # Base URL for your product
  description: "AI-assisted SOX compliance review tool"

# ─────────────────────────────────────────────────────────────────
# TEAM & TICKET CONFIGURATION
# ─────────────────────────────────────────────────────────────────

# For CLARA-specific work (sarthah's instance):
# Tickets go to ppujith. SIM room TBD.
#
# For ALL OTHER PMs using this agent:
# The agent will ASK you on first "File tickets" request:
#   - "Which tool? (SIM-T / Taskei / JIRA / other)"
#   - "Who should I assign to?"
#   - "Which room/project?"
# Your answers are saved here for reuse. You can change anytime.

tickets:
  # Set to "ask" to have the agent prompt you on first use
  # Set to "taskei" or "sim-t" to pre-configure
  tool: "taskei"  
  
  # CLARA UAT Bugs room
  sim_room_id: "21f4d700-d781-4f2e-9c54-2cebdad03cef"
  kanban_board_id: "9ea12fa5-9772-416a-bfe9-b79b43a243d3"
  kanban_board_name: "GRC Clara Pilot UAT - June 2026"
  
  # Pre-configured for CLARA (sarthah's instance)
  default_assignees:
    all: "ppujith"  # Single assignee for all CLARA issues
    # Uncomment below for per-category routing:
    # ai_content: ""
    # frontend: ""
    # backend: ""
    # platform: ""
  
  ticket_format: "summary_impact_fix"  # Options: summary_impact_fix | full_three_layer
  auto_link_to_report: true

# ─────────────────────────────────────────────────────────────────
# QA RUN CONFIGURATION
# ─────────────────────────────────────────────────────────────────

# URLs are ALWAYS provided by the PM/SDM — never auto-discovered.
# The agent does not guess or crawl for test URLs.
# Say "QA this: {url}" to provide the target.

qa_settings:
  # URLs approved for destructive testing (PM adds via "test this one")
  approved_destructive_urls: []
  
  # Queue/dashboard URL — provided by PM when available
  queue_url: ""
  
  # BRD/PRD source for acceptance criteria
  # PM provides their BRD/PRD and agent extracts criteria automatically
  # Or manually maintain a YAML registry here:
  brd_source: "docs/qa-scenarios/brd-acceptance-criteria.yaml"
  
  # Scenario library location
  scenarios_path: "docs/qa-scenarios/"
  
  # Test files for evidence upload scenarios
  test_files_path: "docs/qa-test-files/"
  
  # Screenshot baselines location
  baselines_path: "docs/qa-baselines/"
  
  # Reports output location
  reports_path: "docs/qa-reports/"

# ─────────────────────────────────────────────────────────────────
# HEURISTIC TUNING (Product-Specific)
# ─────────────────────────────────────────────────────────────────

heuristics:
  # Terms that are ALLOWED in user-facing text (won't trigger jargon detection)
  allowed_technical_terms:
    - "CloudWatch"
    - "QuickSight"
    - "DataCentral"
    - "GRC-Next"
    - "Carnaval"
    - "Clearwater"
    - "Delta"
    - "NAWS"
    - "Apollo"
  
  # Internal field names that should NEVER appear in user-facing text
  blocked_internal_terms:
    - "ConfirmationField"
    - "reviewSetId"
    - "entityType"
    - "complianceFlag"
    - "empty array"
  
  # Evidence-related question identifiers (for cross-question consistency checks)
  evidence_questions:
    - question_number: 3
      topic: "Is evidence available and retained?"
    - question_number: 6
      topic: "What actions did you take to confirm operating effectiveness?"

# ─────────────────────────────────────────────────────────────────
# PERSONA CONFIGURATION
# ─────────────────────────────────────────────────────────────────

personas:
  reviewer:
    name: "Review Owner"
    description: "First Line — executes quarterly reviews"
    test_cases_file: "docs/qa-reports/clara-review-owner-test-cases.md"
  approver:
    name: "Review Approver"  
    description: "L7+ manager — approves/rejects submitted reviews"
    test_cases_file: "docs/qa-reports/clara-reviewer-test-cases.md"
  oversight:
    name: "Second/Third Line"
    description: "SOX leadership, Audit, Controllership"
    test_cases_file: "docs/qa-reports/clara-oversight-test-cases.md"
    in_pilot: false  # Not in current pilot — skip execution
